name: Run Benchmark

on:
  workflow_dispatch:
    inputs:
      instance_family:
        description: Instance family to use for the benchmark runner
        type: string
        required: false
        default: g6e.2xlarge
      mode:
        description: Host harness mode
        type: choice
        required: false
        default: prove-stark
        options:
          - execute
          - execute-metered
          - prove-app
          - prove-stark
      host_profile:
        description: Cargo profile for the host harness
        type: choice
        required: false
        default: release
        options:
          - dev
          - release
      iterations:
        description: Optional CoreMark ITERATIONS override
        type: string
        required: false
        default: ""

permissions:
  contents: read

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  benchmark:
    name: Run Host Benchmark
    runs-on:
      - runs-on
      - run-id=${{ github.run_id }}
      - family=${{ inputs.instance_family || github.event.inputs.instance_family }}
      - disk=large
      - tag=bench-coremark-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}
      - extras=s3-cache
      - spot=false
      - image=${{ startsWith(github.event.inputs.instance_family || inputs.instance_family, 'g') && 'ubuntu24-gpu-x64' || contains(github.event.inputs.instance_family || inputs.instance_family, 'g.') && 'ubuntu24-full-arm64' || 'ubuntu24-full-x64' }}
    timeout-minutes: 180

    steps:
      - uses: runs-on/action@v2

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        env:
          RUSTUP_PERMIT_COPY_RENAME: "1"
        with:
          toolchain: nightly-2025-08-19
          components: clippy,rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gnuplot

      - name: Verify GPU setup
        if: ${{ startsWith(inputs.instance_family || github.event.inputs.instance_family, 'g') }}
        run: |
          nvidia-smi
          nvidia-smi -L

      - name: Resolve RISC-V GCC
        run: |
          candidates=(
            riscv32-unknown-elf-gcc
            riscv64-unknown-elf-gcc
            riscv32-linux-gnu-gcc
            riscv64-linux-gnu-gcc
            riscv-none-elf-gcc
            riscv64-unknown-linux-gnu-gcc
          )

          for cc in "${candidates[@]}"; do
            if command -v "$cc" >/dev/null 2>&1; then
              echo "OPENVM_GUEST_GCC=$cc" >> "$GITHUB_ENV"
              echo "Using $cc"
              exit 0
            fi
          done

          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-unknown-elf

          if command -v riscv64-unknown-elf-gcc >/dev/null 2>&1; then
            echo "OPENVM_GUEST_GCC=riscv64-unknown-elf-gcc" >> "$GITHUB_ENV"
            echo "Installed and using riscv64-unknown-elf-gcc"
            exit 0
          fi

          echo "No supported RISC-V GCC toolchain was found." >&2
          exit 1

      - name: Checkout openvm
        run: git clone --depth=1 --branch="v2.0.0-beta.1" https://github.com/openvm-org/openvm.git

      - name: Install cargo-openvm
        working-directory: openvm/crates/cli
        run: cargo install --force --locked --path .

      - name: Install openvm-prof
        working-directory: openvm/crates/prof
        run: cargo install --force --profile=dev --path .

      - name: Build and stage guest ELF
        run: |
          mkdir -p host/elf

          if [[ -n "${{ inputs.iterations }}" ]]; then
            CFLAGS="-DITERATIONS=${{ inputs.iterations }}" cargo openvm build
          else
            cargo openvm build
          fi

          cp target/riscv32im-risc0-zkvm-elf/release/coremark-openvm host/elf/coremark-openvm

      - name: Run host harness benchmark
        run: |
          ./host/scripts/run_coremark.sh \
            --mode "${{ inputs.mode }}" \
            --profile "${{ inputs.host_profile }}"

      - name: Generate openvm-prof outputs
        run: |
          openvm-prof --json-paths metrics.json --output-json openvm-prof.json

      - name: Add benchmark summary
        if: always()
        run: |
          echo "## Host Benchmark" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: \`${{ inputs.mode }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Host profile: \`${{ inputs.host_profile }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "${{ inputs.iterations }}" ]]; then
            echo "- ITERATIONS override: \`${{ inputs.iterations }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ -f metrics.md ]]; then
            cat metrics.md >> "$GITHUB_STEP_SUMMARY"
          elif [[ -f metrics.json ]]; then
            echo "Generated \`metrics.json\`, but no markdown summary was found." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No benchmark metrics were generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-benchmark-${{ inputs.mode }}-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            metrics.json
            metrics.md
            metrics.detailed.md
            openvm-prof.json
            gpu_memory_usage.csv
